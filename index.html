<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 CamRename</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 { font-size: 1.8rem; margin-bottom: 20px; letter-spacing: 2px; color: #f0f0f0; }
        h1 span { color: #00d4ff; }

        #app {
            width: 100%;
            max-width: 480px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #camera-container {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
        }

        #video {
            width: 100%;
            display: block;
            border-radius: 16px;
            transform: translateZ(0);
            image-rendering: auto;
        }

        #camera-container::before,
        #camera-container::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #00d4ff;
            border-style: solid;
            z-index: 10;
        }

        #camera-container::before {
            top: 12px; left: 12px;
            border-width: 3px 0 0 3px;
            border-radius: 4px 0 0 0;
        }

        #camera-container::after {
            bottom: 12px; right: 12px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 4px 0;
        }

        #flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            border-radius: 16px;
            transition: opacity 0.05s;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            width: 100%;
        }

        #btn-capture {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #00d4ff;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            flex-shrink: 0;
        }

        #btn-capture:active {
            transform: scale(0.92);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }

        #btn-capture::after {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            background: #e0e0e0;
        }

        #btn-flip {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-flip:hover { background: rgba(255,255,255,0.2); }

        #canvas { display: none; }

        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        #modal-overlay.show { display: flex; }

        #modal {
            background: #1a1a2e;
            border: 1px solid #00d4ff44;
            border-radius: 20px;
            padding: 28px 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: popIn 0.25s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        #preview-img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            max-height: 220px;
        }

        #modal h2 { font-size: 1.1rem; color: #ccc; text-align: center; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }

        .input-group label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #0f0f23;
            border: 1.5px solid #333;
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: #00d4ff; }

        #filename-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            padding: 12px 14px;
        }

        .ext-badge {
            padding: 12px 14px;
            color: #00d4ff;
            font-size: 0.9rem;
            border-left: 1px solid #333;
            white-space: nowrap;
        }

        .modal-actions { display: flex; gap: 12px; }

        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.97); }
        .btn-cancel { background: #2a2a2a; color: #aaa; }
        .btn-cancel:hover { background: #333; }
        .btn-save { background: linear-gradient(135deg, #00d4ff, #0080ff); color: #fff; }
        .btn-save:hover { opacity: 0.9; }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e1e1e;
            border: 1px solid #00d4ff55;
            color: #fff;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap;
            z-index: 200;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #no-camera {
            display: none;
            text-align: center;
            color: #ff6b6b;
            padding: 40px 20px;
        }

        @media (max-width: 360px) {
            h1 { font-size: 1.4rem; }
            #btn-capture { width: 64px; height: 64px; }
        }
    </style>
</head>
<body>

<div id="app">
    <h1>📸 Cam<span>Rename</span></h1>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="flash"></div>
    </div>

    <div id="no-camera">
        <p>⚠️ Impossible d'accéder à la caméra.<br>Vérifiez les permissions de votre navigateur.</p>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="btn-flip" title="Retourner la caméra">🔄</button>
        <button id="btn-capture" title="Prendre une photo"></button>
        <div style="width:48px"></div>
    </div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <h2>📝 Nommer la photo</h2>
        <img id="preview-img" src="" alt="Aperçu">
        <div class="input-group">
            <label>Nom du fichier</label>
            <div class="input-wrapper">
                <input
                    id="filename-input"
                    type="text"
                    placeholder="ma_super_photo"
                    maxlength="100"
                    autocomplete="off"
                    spellcheck="false"
                >
                <span class="ext-badge">.jpg</span>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-cancel" id="btn-cancel">Annuler</button>
            <button class="btn btn-save"   id="btn-save">💾 Enregistrer</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const state = {
        stream: null,
        facingMode: 'environment',
        capturedDataURL: null,
    };

    const video         = document.getElementById('video');
    const canvas        = document.getElementById('canvas');
    const flash         = document.getElementById('flash');
    const modalOverlay  = document.getElementById('modal-overlay');
    const previewImg    = document.getElementById('preview-img');
    const filenameInput = document.getElementById('filename-input');
    const btnCapture    = document.getElementById('btn-capture');
    const btnFlip       = document.getElementById('btn-flip');
    const btnSave       = document.getElementById('btn-save');
    const btnCancel     = document.getElementById('btn-cancel');
    const toast         = document.getElementById('toast');
    const noCameraMsg   = document.getElementById('no-camera');

    /* ── Démarrer la caméra ── */
    async function startCamera(facingMode = 'environment') {
        if (state.stream) {
            state.stream.getTracks().forEach(t => t.stop());
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode,
                    width:  { ideal: 4096 },
                    height: { ideal: 2160 },
                },
                audio: false,
            });

            state.stream = stream;
            video.srcObject = stream;
            video.style.display = 'block';
            noCameraMsg.style.display = 'none';

        } catch (err) {
            console.error('Erreur caméra :', err);
            video.style.display = 'none';
            noCameraMsg.style.display = 'block';
        }
    }

    /* ── Capturer la photo en vraie résolution ── */
    function capturePhoto() {
        const track    = state.stream?.getVideoTracks()[0];
        const settings = track?.getSettings();

        const w = settings?.width  || video.videoWidth;
        const h = settings?.height || video.videoHeight;

        if (!w || !h) {
            showToast('⚠️ La caméra n\'est pas encore prête');
            return;
        }

        canvas.width  = w;
        canvas.height = h;

        const ctx = canvas.getContext('2d');

        if (state.facingMode === 'user') {
            ctx.translate(w, 0);
            ctx.scale(-1, 1);
        }

        ctx.drawImage(video, 0, 0, w, h);

        // Qualité 0.95 pour réduire la compression
        state.capturedDataURL = canvas.toDataURL('image/jpeg', 0.95);

        triggerFlash();
        openModal();
    }

    /* ── Flash ── */
    function triggerFlash() {
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 120);
    }

    /* ── Modal ── */
    function openModal() {
        previewImg.src = state.capturedDataURL;

        const now  = new Date();
        const pad  = n => String(n).padStart(2, '0');
        const defaultName = `photo_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;

        filenameInput.value = defaultName;
        modalOverlay.classList.add('show');

        setTimeout(() => {
            filenameInput.focus();
            filenameInput.select();
        }, 260);
    }

    function closeModal() {
        modalOverlay.classList.remove('show');
        state.capturedDataURL = null;
        previewImg.src = '';
    }

    /* ── Enregistrer ── */
    function savePhoto() {
        let name = filenameInput.value.trim();

        if (!name) {
            filenameInput.focus();
            return;
        }

        name = name.replace(/[\\/:*?"<>|]/g, '_');

        const link = document.createElement('a');
        link.href     = state.capturedDataURL;
        link.download = `${name}.jpg`;
        link.click();

        closeModal();
        showToast(`✅ Photo enregistrée : ${name}.jpg`);
    }

    /* ── Toast ── */
    let toastTimer = null;

    function showToast(message, duration = 3000) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    /* ── Flip caméra ── */
    function flipCamera() {
        state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
        startCamera(state.facingMode);
    }

    /* ── Événements ── */
    btnCapture.addEventListener('click', capturePhoto);
    btnFlip.addEventListener('click', flipCamera);
    btnSave.addEventListener('click', savePhoto);
    btnCancel.addEventListener('click', closeModal);

    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });

    filenameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') savePhoto();
        if (e.key === 'Escape') closeModal();
    });

    /* ── Lancement ── */
    startCamera(state.facingMode);
</script>

</body>
</html>
