<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📸 CamRename</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Vidéo prend tout l'espace dispo ── */
        #camera-container {
            position: relative;
            flex: 1;
            overflow: hidden;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: translateZ(0);
        }

        /* Coins viseur */
        #camera-container::before,
        #camera-container::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #00d4ff;
            border-style: solid;
            z-index: 10;
        }

        #camera-container::before {
            top: 16px; left: 16px;
            border-width: 3px 0 0 3px;
            border-radius: 4px 0 0 0;
        }

        #camera-container::after {
            bottom: 16px; right: 16px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 4px 0;
        }

        #flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.05s;
        }

        /* ── Barre de contrôles FIXE en bas ── */
        .controls {
            flex-shrink: 0;
            height: 110px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #btn-capture {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #00d4ff;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 24px rgba(0, 212, 255, 0.5);
            flex-shrink: 0;
        }

        #btn-capture:active {
            transform: scale(0.90);
        }

        #btn-capture::after {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            background: #e0e0e0;
        }

        #btn-flip {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-flip:active { background: rgba(255,255,255,0.25); }

        #canvas { display: none; }

        /* ── Erreur caméra ── */
        #no-camera {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ff6b6b;
            padding: 40px;
            font-size: 1rem;
        }

        /* ── Modal ── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        #modal-overlay.show { display: flex; }

        #modal {
            background: #1a1a2e;
            border: 1px solid #00d4ff44;
            border-radius: 20px;
            padding: 24px;
            width: 92%;
            max-width: 400px;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: popIn 0.25s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        #preview-img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            max-height: 200px;
        }

        #modal h2 {
            font-size: 1.1rem;
            color: #ccc;
            text-align: center;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }

        .input-group label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #0f0f23;
            border: 1.5px solid #333;
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: #00d4ff; }

        #filename-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            padding: 12px 14px;
        }

        .ext-badge {
            padding: 12px 14px;
            color: #00d4ff;
            font-size: 0.9rem;
            border-left: 1px solid #333;
        }

        .modal-actions { display: flex; gap: 12px; }

        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.97); }
        .btn-cancel { background: #2a2a2a; color: #aaa; }
        .btn-save { background: linear-gradient(135deg, #00d4ff, #0080ff); color: #fff; }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #1e1e1e;
            border: 1px solid #00d4ff55;
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.88rem;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap;
            z-index: 200;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- Caméra -->
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="flash"></div>
        <div id="no-camera">
            ⚠️ Impossible d'accéder à la caméra.<br>Vérifiez les permissions.
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <!-- Barre boutons collée en bas -->
    <div class="controls">
        <button id="btn-flip">🔄</button>
        <button id="btn-capture"></button>
        <div style="width:50px"></div>
    </div>

    <!-- Modal nommage -->
    <div id="modal-overlay">
        <div id="modal">
            <h2>📝 Nommer la photo</h2>
            <img id="preview-img" src="" alt="Aperçu">
            <div class="input-group">
                <label>Nom du fichier</label>
                <div class="input-wrapper">
                    <input
                        id="filename-input"
                        type="text"
                        placeholder="ma_super_photo"
                        maxlength="100"
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <span class="ext-badge">.jpg</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" id="btn-cancel">Annuler</button>
                <button class="btn btn-save" id="btn-save">💾 Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

<script>
    const state = {
        stream: null,
        facingMode: 'environment',
        capturedDataURL: null,
    };

    const video         = document.getElementById('video');
    const canvas        = document.getElementById('canvas');
    const flash         = document.getElementById('flash');
    const modalOverlay  = document.getElementById('modal-overlay');
    const previewImg    = document.getElementById('preview-img');
    const filenameInput = document.getElementById('filename-input');
    const btnCapture    = document.getElementById('btn-capture');
    const btnFlip       = document.getElementById('btn-flip');
    const btnSave       = document.getElementById('btn-save');
    const btnCancel     = document.getElementById('btn-cancel');
    const toast         = document.getElementById('toast');
    const noCameraMsg   = document.getElementById('no-camera');

    async function startCamera(facingMode = 'environment') {
        if (state.stream) {
            state.stream.getTracks().forEach(t => t.stop());
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode,
                    width:  { ideal: 4096 },
                    height: { ideal: 2160 },
                },
                audio: false,
            });
            state.stream = stream;
            video.srcObject = stream;
            noCameraMsg.style.display = 'none';
        } catch (err) {
            console.error(err);
            noCameraMsg.style.display = 'flex';
        }
    }

    function capturePhoto() {
        const track    = state.stream?.getVideoTracks()[0];
        const settings = track?.getSettings();
        const w = settings?.width  || video.videoWidth;
        const h = settings?.height || video.videoHeight;

        if (!w || !h) { showToast('⚠️ Caméra pas encore prête'); return; }

        canvas.width  = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');

        if (state.facingMode === 'user') {
            ctx.translate(w, 0);
            ctx.scale(-1, 1);
        }

        ctx.drawImage(video, 0, 0, w, h);
        state.capturedDataURL = canvas.toDataURL('image/jpeg', 0.95);

        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 120);

        openModal();
    }

    function openModal() {
        previewImg.src = state.capturedDataURL;
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        filenameInput.value = `photo_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        modalOverlay.classList.add('show');
        setTimeout(() => { filenameInput.focus(); filenameInput.select(); }, 260);
    }

    function closeModal() {
        modalOverlay.classList.remove('show');
        state.capturedDataURL = null;
        previewImg.src = '';
    }

    function savePhoto() {
        let name = filenameInput.value.trim();
        if (!name) { filenameInput.focus(); return; }
        name = name.replace(/[\\/:*?"<>|]/g, '_');
        const link = document.createElement('a');
        link.href = state.capturedDataURL;
        link.download = `${name}.jpg`;
        link.click();
        closeModal();
        showToast(`✅ ${name}.jpg enregistré`);
    }

    let toastTimer = null;
    function showToast(msg, duration = 3000) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function flipCamera() {
        state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
        startCamera(state.facingMode);
    }

    btnCapture.addEventListener('click', capturePhoto);
    btnFlip.addEventListener('click', flipCamera);
    btnSave.addEventListener('click', savePhoto);
    btnCancel.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    filenameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') savePhoto();
        if (e.key === 'Escape') closeModal();
    });

    startCamera(state.facingMode);
</script>

</body>
</html>
